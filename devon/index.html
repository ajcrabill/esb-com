<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Devon — ESB Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333}
.header{background:#0d6b4a;color:white;padding:1rem 2rem}
.header h1{font-size:1.5rem;margin:0}
.container{max-width:800px;margin:2rem auto;padding:0 1rem}
h2{margin-bottom:.5rem}
p{margin-bottom:1rem;color:#666}
.chat-box{height:400px;overflow-y:auto;border:1px solid #ddd;padding:15px;margin-bottom:15px;background:#fafafa;border-radius:8px}
.input-row{display:flex;gap:10px}
.input-row input{flex:1;padding:12px;border:1px solid #ccc;border-radius:6px;font-size:14px}
.input-row button{padding:12px 24px;background:#0d6b4a;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px}
.msg-right{text-align:right;margin:8px 0}
.msg-right span{background:#0d6b4a;color:white;padding:8px 14px;border-radius:12px;display:inline-block;max-width:70%}
.msg-left{text-align:left;margin:8px 0}
.msg-left span{background:#e9ecef;color:#333;padding:8px 14px;border-radius:12px;display:inline-block;max-width:70%}
.msg-error{text-align:left;margin:8px 0}
.msg-error span{background:#f8d7da;color:#721c24;padding:8px 14px;border-radius:12px;display:inline-block;max-width:70%}
.connecting{color:#888;text-align:center;padding:20px}
.connected{color:#0d6b4a;text-align:center;padding:20px}
.offline{color:#856404;text-align:center;padding:20px}
</style>
</head>
<body>
<div class="header"><h1>Effective School Boards</h1></div>
<div class="container">
  <h2>Devon</h2>
  <p>ESB operations assistant. Ask me about districts, leads, or pipeline.</p>
  <div id="chat-messages" class="chat-box"><div class="connecting">Connecting to Devon...</div></div>
  <div class="input-row">
    <input type="text" id="chat-input" placeholder="Type your message...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>
<script src="chat.js"></script>
</body>
</html>
